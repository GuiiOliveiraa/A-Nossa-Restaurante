<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A NOSSA | Delivery Profissional</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="toast-container"></div>

    <header class="main-header">
      <div class="container navbar">
        <div class="brand">
          <div class="logo-badge">
            <img src="Logo.PNG" alt="A Nossa Restaurante" />
          </div>
          <div>
            <h1 class="brand-name">A Nossa Restaurante</h1>
            <span class="status-online">● Aberto para pedidos</span>
          </div>
        </div>

        <div class="nav-actions">
          <button class="admin-trigger">Admin</button>
          <button class="cart-trigger" aria-label="Abrir carrinho">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <path d="M16 10a4 4 0 0 1-8 0" />
            </svg>
            <span id="cart-counter">0</span>
          </button>
        </div>
      </div>
    </header>

    <main class="container content-wrapper">
      <section id="menu-page">
        <div class="page-title-row">
          <div>
            <span class="eyebrow">Delivery online</span>
            <h2 class="section-title">Nosso Cardápio</h2>
          </div>
        </div>

        <div class="category-tabs" id="category-tabs"></div>
        <div class="menu-grid" id="menu-grid"></div>
      </section>

      <section id="login-page" class="auth-page is-hidden">
        <div class="auth-card">
          <div>
            <span class="eyebrow">Acesso restrito</span>
            <h2 class="section-title">Entrar no painel administrativo</h2>
            <p class="auth-copy">
              Use suas credenciais para acessar o gerenciamento de produtos.
            </p>
          </div>

          <form class="auth-form" id="login-form">
            <label>
              Usuário ou e-mail
              <input
                type="text"
                id="login-identifier"
                class="input-field"
                autocomplete="username"
                required
              />
            </label>

            <label>
              Senha
              <input
                type="password"
                id="login-password"
                class="input-field"
                autocomplete="current-password"
                required
              />
            </label>

            <p id="login-error" class="form-error is-hidden" aria-live="polite"></p>

            <div class="admin-actions">
              <button class="btn-primary" type="submit">Entrar</button>
              <button class="btn-secondary" type="button" id="btn-login-back">
                Voltar ao cardápio
              </button>
            </div>
          </form>
        </div>
      </section>

      <section id="admin-page" class="admin-page is-hidden">
        <div class="page-title-row">
          <div>
            <span class="eyebrow">Admin</span>
            <h2 class="section-title">Gerenciar produtos</h2>
          </div>
          <div class="header-inline-actions">
            <button class="btn-secondary" id="btn-back-to-menu" type="button">
              Voltar ao cardápio
            </button>
            <button class="btn-danger" id="btn-logout" type="button">Sair</button>
          </div>
        </div>

        <div class="admin-layout">
          <form class="admin-form" id="product-form">
            <input type="hidden" id="product-id" />

            <label>
              Nome do produto
              <input
                type="text"
                id="product-name"
                class="input-field"
                required
              />
            </label>

            <label>
              Descrição
              <textarea
                id="product-desc"
                class="input-field"
                rows="3"
                required
              ></textarea>
            </label>

            <div class="form-grid">
              <label>
                Preço
                <input
                  type="number"
                  id="product-price"
                  class="input-field"
                  min="0"
                  step="0.01"
                  required
                />
              </label>

              <label>
                Categoria
                <select
                  id="product-category"
                  class="input-field"
                  required
                ></select>
              </label>
            </div>

            <label>
              Imagem do produto
              <input
                type="text"
                id="product-image"
                class="input-field"
                placeholder="https://... ou Logo.PNG"
              />
            </label>

            <label class="checkbox-field">
              <input type="checkbox" id="product-available" checked />
              Produto disponível no cardápio
            </label>

            <div class="admin-actions">
              <button class="btn-primary" type="submit">Salvar produto</button>
              <button class="btn-secondary" type="button" id="btn-reset-form">
                Limpar
              </button>
            </div>
          </form>

          <div class="admin-list" id="admin-product-list"></div>
        </div>
      </section>
    </main>

    <aside class="side-cart" id="side-cart">
      <div class="cart-header">
        <h3>Meu Carrinho</h3>
        <button class="close-btn" aria-label="Fechar carrinho">&times;</button>
      </div>
      <div class="cart-items" id="cart-items"></div>
      <div class="cart-footer">
        <div class="summary-line">
          <span>Total do Pedido</span>
          <span id="subtotal">R$ 0,00</span>
        </div>
        <button class="btn-checkout">Próximo Passo: Entrega</button>
      </div>
    </aside>

    <div id="modal-overlay" class="modal-hidden">
      <div class="modal-content" id="modal-content-area"></div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
